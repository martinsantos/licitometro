# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=3r/m;

# HTTP - serve content (Cloudflare Flexible SSL proxy mode)
# NOTE: Cloudflare en modo Flexible SSL conecta al origin via HTTP (puerto 80).
# NO redirigir HTTP->HTTPS aqui o se produce redirect loop con Cloudflare.
# www.licitometro.ar -> canonical licitometro.ar via 301 (SEO + cookie consistency).
server {
    listen 80;
    server_name www.licitometro.ar;

    # Let's Encrypt challenge (necesario aunque www no tenga cert directo)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Canonical redirect: www -> apex (301 permanente)
    # Cloudflare maneja el HTTPS en el edge, nginx solo redirige el host
    return 301 $scheme://licitometro.ar$request_uri;
}

server {
    listen 80;
    server_name srv1342577.hstgr.cloud licitometro.ar;

    # File upload limit (must match backend MAX_FILE_SIZE=25MB)
    client_max_body_size 30m;

    # Gzip compression (Cloudflare Flexible SSL proxies via HTTP - must compress here)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # Health check (Docker internal, no redirect)
    location /api/health {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Auth endpoints - strict rate limit
    location /api/auth/login {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API proxy
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Increased from 120s: enrichment + bulk queries can take longer on large datasets
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Licitometro static assets with long cache
    location /static/ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Favicon and manifest
    location ~* \.(ico|png|webmanifest)$ {
        root /usr/share/nginx/html;
        expires 7d;
        try_files $uri =404;
    }

    # --- Manual de Licitometro (privado, requiere login) ---
    # ^~ prevents regex locations (e.g. *.png) from matching /manual/* paths,
    # so manual images are served from here, not from the frontend build dir.
    location ^~ /manual {
        # Verify auth via /api/auth/check (returns 200 if logged in, 401 otherwise)
        auth_request /api/_auth_subrequest;
        error_page 401 = @manual_login_redirect;

        alias /usr/share/nginx/manual;
        try_files $uri $uri/ $uri.html /index.html;
        expires 5m;
        add_header Cache-Control "private, max-age=300";
    }

    location @manual_login_redirect {
        return 302 /;
    }

    # Internal auth subrequest (used by /manual)
    # Force IPv4 via Docker embedded DNS (backend's IPv6 refuses connections)
    # Internal auth subrequest (used by /manual).
    # NOTE: Uses IPv4 loopback via Docker bridge gateway because the backend
    # container has both A and AAAA records, and nginx's resolver picks IPv6
    # which refuses the connection (backend only binds IPv4). The nginx
    # `resolver ipv6=off` directive does not work reliably with `set` +
    # variable in proxy_pass here, so we use the pinned service IP that
    # Docker Compose assigns on the internal bridge (172.18.0.2 = backend,
    # second service in the stack after mongodb).
    location = /api/_auth_subrequest {
        internal;
        proxy_pass http://172.18.0.2:8000/api/auth/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Host $host;
    }

    # --- Licitometro SPA fallback - no-cache so deploys are instant ---
    location / {
        root /usr/share/nginx/html;
        index index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }
}

# HTTPS - direct access (bypass Cloudflare)
# www -> apex redirect via HTTPS
server {
    listen 443 ssl http2;
    server_name www.licitometro.ar;

    # SSL certificates (Let's Encrypt - debe incluir www en el SAN)
    ssl_certificate /etc/letsencrypt/live/licitometro.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/licitometro.ar/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Canonical redirect: www -> apex
    return 301 https://licitometro.ar$request_uri;
}

# HTTPS - apex domain
server {
    listen 443 ssl http2;
    server_name srv1342577.hstgr.cloud licitometro.ar;

    # File upload limit
    client_max_body_size 30m;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/licitometro.ar/fullchain.pem;
