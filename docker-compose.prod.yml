version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "mongosh", "-u", "${MONGO_USER}", "-p", "${MONGO_PASSWORD}", "--authenticationDatabase", "admin", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: always
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - MONGO_URL=${MONGO_URL}
      - DB_NAME=${DB_NAME}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - AUTH_PASSWORD_HASH=${AUTH_PASSWORD_HASH}
      - TOKEN_EXPIRY_HOURS=${TOKEN_EXPIRY_HOURS:-24}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - STORAGE_MAX_MB=${STORAGE_MAX_MB:-500}
      - RUN_HISTORY_KEEP=${RUN_HISTORY_KEEP:-10}
      - CACHE_TTL_HOURS=${CACHE_TTL_HOURS:-168}
      - LOG_RETENTION_DAYS=${LOG_RETENTION_DAYS:-7}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-25}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - NOTIFICATION_EMAIL_TO=${NOTIFICATION_EMAIL_TO:-}
    volumes:
      - storage_data:/app/storage
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 1536M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      start_period: 120s
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  nginx:
    # Official image - no custom Dockerfile, no Docker build, no apk/apt installs.
    # Configs and frontend are injected via bind mounts at runtime.
    image: nginx:1.25-alpine@sha256:516475cc129da42866742567714ddc681e5eed7b9ee0b9e9c015e464b4221a00
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend/build:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/templates/nginx-ssl.conf:ro
      - ./nginx/nginx-initial.conf:/etc/nginx/templates/nginx-initial.conf:ro
      - ./nginx/entrypoint.sh:/entrypoint.sh:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    command: ["nginx", "-g", "daemon off;"]
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost/api/health 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  cotizar-api:
    image: ghcr.io/martinsantos/cotiza:latest
    restart: always
    environment:
      - NODE_ENV=production
      - BASE_PATH=/cotizar
      - API_PORT=3000
      - API_HOST=0.0.0.0
      - LICITOMETRO_API_URL=http://backend:8000/api
      - COMPANY_NAME=${COTIZAR_COMPANY_NAME:-Mi Empresa SA}
      - COMPANY_TAX_ID=${COTIZAR_COMPANY_TAX_ID:-}
      - OUTPUT_DIR=./bids
      - LOG_LEVEL=info
    volumes:
      - cotizar_bids:/app/bids
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/cotizar/health"]
      start_period: 30s
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  openclaw-gateway:
    build:
      context: ./openclaw
      dockerfile: Dockerfile
    image: licitometro/openclaw-gateway:latest
    restart: unless-stopped
    environment:
      HOME: /home/node
      TERM: xterm-256color
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_TELEGRAM_BOT_TOKEN: ${OPENCLAW_TELEGRAM_BOT_TOKEN:-}
      OPENCLAW_TELEGRAM_OWNER_ID: ${OPENCLAW_TELEGRAM_OWNER_ID:-}
    volumes:
      - openclaw_config:/home/node/.openclaw
      - ./openclaw/config/config.json:/home/node/config.template.json:ro
      - openclaw_workspace:/home/node/.openclaw/workspace
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
    command:
      - "gateway"
      - "--bind"
      - "lan"
      - "--port"
      - "18789"
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

networks:
  internal:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.18.0.0/16
        - subnet: 2a02:4780:6e:9b84:2::/80

volumes:
  mongo_data:
    # CRITICAL: MongoDB data - never deleted even with "docker compose down -v"
    name: licitometro_mongo_data
    external: false
  storage_data:
    name: licitometro_storage_data
    external: false
  cotizar_bids:
    name: licitometro_cotizar_bids
    external: false
  openclaw_config:
    name: licitometro_openclaw_config
    external: false
  openclaw_workspace:
    name: licitometro_openclaw_workspace
    external: false
  certbot_webroot:
  certbot_certs:
